<!DOCTYPE html>
<html>
<head>
    <title>Belajar JS DOM</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .card { border: 2px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; margin: 0 auto; }
        #btn-beli { background: #f7df1e; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="nama-game">Mobile Legends</h1>
        <p id="item-deskripsi">500 Diamonds</p>
        <h2 id="harga-tampil">Rp 120.000</h2>
        <p id="notif-status">Klik tombol untuk membeli</p>
        
        <button id="btn-beli">BELI SEKARANG</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
